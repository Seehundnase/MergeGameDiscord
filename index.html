<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge Game</title>
    <script src="https://cdn.jsdelivr.net/npm/@discord/embedded-app-sdk@1.0.0/dist/index.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #492516; }
        #game-frame { width: 100vw; height: 100vh; border: none; display: none; }
        .loading { color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
    </style>
</head>
<body>
    <div id="loading-screen" class="loading">Initializing Merge Game...</div>
    
    <iframe id="game-frame" src="game.html" allowfullscreen="true" allow="autoplay; gamepad; keyboard" style="width: 100%; height: 100%; border: none;"></iframe>

    <script>
        async function startApp() {
            const DiscordSDK = window.discord?.DiscordSDK;
            if (!DiscordSDK) {
                setTimeout(startApp, 100);
                return;
            }

            const discordSdk = new DiscordSDK("1089896483639271485");

            try {
                await discordSdk.ready();
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('game-frame').style.display = 'block';
            } catch (error) {
                console.error("Discord connection error:", error);
                document.getElementById('loading-screen').innerText = "Please launch from a Discord Voice Channel.";
            }
        }
        startApp();
    </script>
</body>
</html>
