<!DOCTYPE html>
<html>
<head>
    <title>My Discord Activity</title>
    <script src="https://unpkg.com/@discord/embedded-app-sdk@1.0.0/dist/index.js"></script>
</head>
<body style="margin:0; padding:0; overflow:hidden; background-color: #000;">
    <iframe id="game-iframe" 
            src="https://itch.io/embed-upload/16438518?color=492516" 
            style="width:100vw; height:100vh; border:none;" 
            allowfullscreen>
    </iframe>

    <script>
        // Initialize the Discord SDK
        const discordSdk = new discord.DiscordSDK("YOUR_CLIENT_ID_HERE");

        async function setup() {
            await discordSdk.ready();
            console.log("Discord Activity is ready!");
        }

        setup();
    </script>
</body>
</html>
